name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  php:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['11', '12', '13']
        exclude:
          - php: '8.2'
            laravel: '13'
        include:
          - laravel: '11'
            testbench: '^9.0'
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, json, gd
          coverage: none

      - name: Pin Laravel version
        run: |
          composer require "laravel/framework:^${{ matrix.laravel }}.0" --no-update --no-interaction
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction

      # Laravel 11 is past its security-fix window; allow resolving it anyway
      # (compatibility check for existing L11 apps, not an endorsement).
      - name: Allow EOL framework resolution (Laravel 11 only)
        if: matrix.laravel == '11'
        run: composer config policy.advisories.block false

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Lint
        run: vendor/bin/pint --test

      - name: Static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: Test
        run: vendor/bin/pest --colors=always

  js:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        # Library-пакет: package-lock.json не коммитится (см. .gitignore).
        # Используем `npm install` вместо `npm ci` — генерирует lock на лету.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
